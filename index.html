<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Crust Kitchen</title>
    <style>
        /* Import Luxury Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

        /* Dark Theme Variables */
        :root {
            --bg-color: #121212; /* Adjusted to a deep charcoal to match the logo background */
            --text-main: #f5f5f5; 
            --accent-color: #c5a059; /* Adjusted to match the specific metallic gold in your logo */
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            text-align: center;
        }

        /* Navigation / Header */
        header {
            padding: 40px 20px 0;
        }

        .logo-img {
            max-width: 300px; /* Adjust this value to make the logo bigger or smaller */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Hero Section */
        .hero {
            padding: 60px 20px 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
        }

        .hero h1 {
            font-family: var(--font-heading);
            font-size: 3.5rem;
            font-weight: 400;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .hero p {
            font-weight: 300;
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 40px;
            color: #b0b0b0;
        }

        /* The Clover CTA Button */
        .cta-button {
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 15px 40px;
            font-size: 1rem;
            font-family: var(--font-body);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cta-button:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        /* Footer */
        footer {
            padding: 40px 20px;
            font-size: 0.9rem;
            color: #666;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <header>
        <img src="CCK_Logo.png" alt="Custom Crust Kitchen Logo" class="logo-img">
    </header>

    <section class="hero">
        <h1>Crafted to Perfection.</h1>
        <p>Experience the art of the perfect pie. Fresh ingredients, masterful technique, and a crust like no other.</p>
        
        <a href="#" class="cta-button">Order Now</a>
    </section>

    <footer>
        <p>Boston, MA | Open Daily</p>
        <p>&copy; 2026 Custom Crust Kitchen LLC. All Rights Reserved.</p>
    </footer>

</body>
</html>
